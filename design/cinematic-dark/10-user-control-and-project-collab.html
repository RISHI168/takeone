<div class="flex items-center justify-between px-6 py-5 border-b border-surface-border bg-[#231429]">

<div class="px-6 pt-6 pb-2">
<div class="flex items-center justify-between mb-3">
<label class="text-white text-sm font-semibold">Project Visibility</label>
</div>
<div class="flex h-12 w-full items-center justify-center rounded-lg bg-surface-dark p-1 border border-surface-border/50">
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-[4px] px-2 has-[:checked]:bg-[#3c2249] has-[:checked]:text-white has-[:checked]:shadow-sm text-text-dim text-sm font-medium transition-all duration-200">
<span class="flex items-center gap-2">
<span class="material-symbols-outlined text-lg">lock</span>
                            Private
                        </span>
<input class="invisible w-0 absolute" name="visibility" type="radio" value="Private"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-[4px] px-2 has-[:checked]:bg-[#3c2249] has-[:checked]:text-white has-[:checked]:shadow-sm text-text-dim text-sm font-medium transition-all duration-200">
<span class="flex items-center gap-2">
<span class="material-symbols-outlined text-lg">groups</span>
                            Team Access
                        </span>
<input checked="" class="invisible w-0 absolute" name="visibility" type="radio" value="Team Access"/>
</label>
</div>
</div>

</div>
<input class="w-full pl-10 pr-3 py-3 bg-surface-dark border border-surface-border rounded-lg text-white placeholder-text-dim focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all text-sm" placeholder="Enter email addresses..." type="email"/>
</div>
<div class="relative min-w-[120px]">
<select class="w-full h-full pl-3 pr-8 py-3 bg-surface-dark border border-surface-border rounded-lg text-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary appearance-none cursor-pointer text-sm">

<option>Viewer</option>
<option>Admin</option>
</select>
<div class="absolute inset-y-0 right-0 flex items-center px-2 pointer-events-none text-text-dim">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>

<option class="bg-surface-dark">Disabled</option>
